<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 PRO</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  font-family:'Pretendard';
  background:#000;
  color:white;
  padding:20px;
}

h2{text-align:center;}

.section{
  max-width:760px;
  margin:20px auto;
  background:rgba(10,10,10,0.75);
  border:1px solid #111;
  border-radius:16px;
  padding:20px;
  backdrop-filter: blur(10px);
}

.item{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.label{
  width:120px;
  text-align:right;
  color:#cbd5e1;
}

input{
  background:#0b0f19;
  border:1px solid #1f2937;
  color:white;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

button{
  border:none;
  border-radius:8px;
  padding:5px 10px;
  cursor:pointer;
}

.save{background:#16a34a;color:white;}
.del{background:#374151;color:white;}

.locked{opacity:0.4;pointer-events:none;}

.chat-panel{
  position:fixed;
  right:20px;
  top:20px;
  width:340px;
  height:calc(100vh - 40px);
  background:rgba(10,10,10,0.7);
  backdrop-filter: blur(14px);
  border:1px solid #1f2937;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  padding:10px;
}

.chat-box{
  flex:1;
  overflow:auto;
  background:#050505;
  border-radius:10px;
  padding:10px;
}

.chat-input{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px 20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>패도혈 PRO</h2>

<div id="stat" style="text-align:center;color:#94a3b8;"></div>

<!-- 채팅 -->
<div class="chat-panel" id="chatPanel">
  <h3>채팅</h3>
  <div id="chat" class="chat-box"></div>
  <div class="chat-input">
    <input id="msg" placeholder="메시지">
    <button class="save" onclick="sendChat()">전송</button>
  </div>
</div>

<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", uid);

let myName = localStorage.getItem("nickname") || prompt("닉네임") || "익명";
localStorage.setItem("nickname", myName);

/* =========================
   접속자
========================= */
const presenceRef = db.ref("presence/" + uid);
presenceRef.set({ name: myName });
presenceRef.onDisconnect().remove();

db.ref("presence").on("value", snap=>{
  const users = Object.values(snap.val()||{}).map(v=>v.name);
  document.getElementById("stat").innerText =
    `🟢 접속 ${users.length}명 | 점유율 계산중...`;

  if(users.length){
    showToast(`👤 ${users[users.length-1]} 접속`);
  }
});

/* =========================
   자리 + 락
========================= */
let state = {};
let locks = {};
let waitList = [];

db.ref("tracker/state").on("value", s=>{
  state = s.val() || {};
  render();
});

db.ref("tracker/waitList").on("value", s=>{
  waitList = s.val() || [];
  render();
});

db.ref("locks").on("value", s=>{
  locks = s.val() || {};
  render();
});

/* =========================
   채팅
========================= */
db.ref("chat").limitToLast(30).on("value", snap=>{
  const box = document.getElementById("chat");
  box.innerHTML = "";

  const arr = Object.values(snap.val()||{});

  arr.forEach(v=>{
    const div = document.createElement("div");
    div.innerText = `${v.name}: ${v.msg}`;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;

  if(arr.length){
    const last = arr[arr.length-1];
    showToast(`💬 ${last.name}: ${last.msg}`);
    playBeep();
  }
});

function sendChat(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;
  db.ref("chat").push({ name:myName, msg });
  document.getElementById("msg").value="";
}

/* =========================
   🔊 띵 소리
========================= */
let audioCtx;

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
}

function playBeep(){
  initAudio();

  const now = audioCtx.currentTime;

  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o1.frequency.value = 880;
  o2.frequency.value = 1320;

  g.gain.value = 0.08;

  o1.connect(g);
  o2.connect(g);
  g.connect(audioCtx.destination);

  o1.start(now);
  o1.stop(now+0.1);

  o2.start(now+0.06);
  o2.stop(now+0.16);
}

/* =========================
   락 시스템
========================= */
function lock(pos){
  db.ref("locks/"+pos).set({user:myName});
}

function unlock(pos){
  db.ref("locks/"+pos).remove();
}

/* =========================
   대기 자동 상태
========================= */
function updateWaitStatus(){
  let changed=false;

  waitList.forEach((w,i)=>{
    if(!w.time || !w.name) return;

    const now=new Date();
    const [h,m]=w.time.split(":").map(Number);

    const t=new Date();
    t.setHours(h,m,0,0);

    if(now>=t){
      if(w.status!=="ready"){
        w.status="ready";
        changed=true;
      }
    }else{
      w.status="wait";
    }
  });

  if(changed){
    db.ref("tracker/waitList").set(waitList);
  }
}

setInterval(updateWaitStatus,30000);

/* =========================
   render
========================= */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  let used=0,total=0;

  const box=document.createElement("div");
  box.className="section";

  Object.keys(state).forEach(pos=>{
    total++;
    if(state[pos]?.name) used++;

    const row=document.createElement("div");
    row.className="item";

    const lockedBy=locks[pos]?.user;

    const label=document.createElement("div");
    label.className="label";
    label.innerText=pos;

    const input=document.createElement("input");
    input.value=state[pos]?.name||"";

    if(lockedBy && lockedBy!==myName){
      input.disabled=true;
      input.classList.add("locked");
    }

    input.onfocus=()=>lock(pos);
    input.onblur=()=>unlock(pos);

    const save=document.createElement("button");
    save.className="save";
    save.innerText="저장";
    save.onclick=()=>{
      state[pos]={name:input.value};
      db.ref("tracker/state").set(state);
      unlock(pos);
    };

    const del=document.createElement("button");
    del.className="del";
    del.innerText="삭제";
    del.onclick=()=>{
      delete state[pos];
      db.ref("tracker/state").set(state);
    };

    row.append(label,input,save,del);

    if(lockedBy && lockedBy!==myName){
      const tag=document.createElement("div");
      tag.innerText=`🔒 ${lockedBy} 수정중`;
      tag.style.color="#f59e0b";
      row.appendChild(tag);
    }

    box.appendChild(row);
  });

  app.appendChild(box);

  document.getElementById("stat").innerText =
    `🟢 접속 + 자리점유율 ${(used/total*100||0).toFixed(1)}%`;
}

/* =========================
   toast
========================= */
function showToast(text){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=text;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}
</script>

</body>
</html>
