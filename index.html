<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  font-family:'Pretendard';
  background:#000;
  color:white;
  padding:20px;
}

h2 {
  text-align:center;
  margin-bottom:10px;
}

.topbar {
  text-align:center;
  margin-bottom:20px;
}

.nickname {
  font-size:14px;
  color:#94a3b8;
}

.section {
  max-width:720px;
  margin:20px auto;
  background:#0b0b0b;
  border-radius:18px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
  border:1px solid #111;
}

h3 {
  text-align:center;
  margin-bottom:15px;
}

.item {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.label {
  width:120px;
  text-align:right;
  color:#cbd5f5;
}

input {
  width:130px;
  padding:6px;
  border-radius:8px;
  border:none;
  text-align:center;
  background:#111;
  color:white;
}

button {
  padding:5px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.save { background:#16a34a; color:white; }
.del { background:#374151; color:white; }
.del:hover { background:#dc2626; }

.wait-normal { background:#0b2a5a; }
.wait-soon { background:#a16207; }
.wait-urgent { background:#7f1d1d; }

.wait-row {
  padding:6px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>

<div class="topbar">
  <div id="nick" class="nickname"></div>
  <div id="online" class="nickname"></div>
  <button onclick="changeName()">닉네임 변경</button>
</div>

<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 유저 ID
let uid = localStorage.getItem("uid");
if(!uid){
  uid = Math.random().toString(36).substring(2);
  localStorage.setItem("uid", uid);
}

// 🔥 닉네임
function getName(){
  let name = localStorage.getItem("nickname");

  if(!name || name.trim()===""){
    name = prompt("닉네임 입력");
    if(!name || name.trim()==="") return getName();
    localStorage.setItem("nickname", name.trim());
  }
  return name;
}

let myName = getName();
document.getElementById("nick").innerText = `👤 ${myName}`;

// 🔥 접속자 표시
const myRef = db.ref("presence/" + uid);
myRef.set(true);
myRef.onDisconnect().remove();

db.ref("presence").on("value", snap=>{
  const count = snap.numChildren();
  document.getElementById("online").innerText = `🟢 접속자: ${count}`;
});

function changeName(){
  localStorage.removeItem("nickname");
  location.reload();
}

// 구조
let layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

// 실시간
db.ref("tracker").on("value", snap=>{
  let val = snap.val();
  if(!val){
    val = {state:{}, waitList:[{name:"",time:""}]};
    db.ref("tracker").set(val);
  }
  state = val.state || {};
  waitList = val.waitList || [];
  render();
});

// 저장
function save(){
  db.ref("tracker").set({state, waitList});
}

// 시간 색상
function getTimeClass(time){
  if(!time) return "wait-normal";

  const now = new Date();
  const [h,m] = time.split(":").map(Number);
  const t = new Date();
  t.setHours(h,m);

  const diff = (t - now)/60000;

  if(diff < 30) return "wait-urgent";
  if(diff < 60) return "wait-soon";
  return "wait-normal";
}

// 렌더
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.entries(layout).forEach(([section, list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText = section;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const label = document.createElement("div");
      label.className="label";
      label.innerText = pos;

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const user = document.createElement("div");
      user.style.fontSize="11px";
      user.style.color="#94a3b8";
      user.innerText = state[pos]?.user ? `(${state[pos].user})` : "";

      const saveBtn = document.createElement("button");
      saveBtn.innerText="저장";
      saveBtn.className="save";
      saveBtn.onclick=()=>{
        if(!input.value.trim()) return;
        state[pos] = {name:input.value, user:myName};
        save();
      };

      const del = document.createElement("button");
      del.innerText="삭제";
      del.className="del";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      row.append(label, input, saveBtn, del, user);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 대기
  const waitBox = document.createElement("div");
  waitBox.className="section";

  const t = document.createElement("h3");
  t.innerText="대기";
  waitBox.appendChild(t);

  waitList.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className="item wait-row " + getTimeClass(w.time);

    const name = document.createElement("input");
    name.value = w.name;

    const time = document.createElement("input");
    time.type="time";
    time.value = w.time;

    const saveBtn = document.createElement("button");
    saveBtn.innerText="저장";
    saveBtn.className="save";
    saveBtn.onclick=()=>{
      waitList[i] = {name:name.value, time:time.value, user:myName};
      save();
    };

    const del = document.createElement("button");
    del.innerText="삭제";
    del.className="del";
    del.onclick=()=>{
      waitList.splice(i,1);
      if(!waitList.length) waitList.push({name:"",time:""});
      save();
    };

    row.append(name, time, saveBtn, del);
    waitBox.appendChild(row);
  });

  const add = document.createElement("button");
  add.innerText="대기 추가";
  add.className="save";
  add.onclick=()=>{
    waitList.push({name:"",time:""});
    save();
  };

  waitBox.appendChild(add);
  app.appendChild(waitBox);
}
</script>

</body>
</html>
