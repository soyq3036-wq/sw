<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
body {
  font-family: 'Pretendard', sans-serif;
  background:#f4f6f8;
  padding:20px;
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

.section {
  background:white;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.item {
  display:flex;
  gap:6px;
  justify-content:center;
  margin-bottom:6px;
}

.label {
  width:90px;
  text-align:right;
  font-size:13px;
}

input {
  width:90px;
  padding:5px;
  text-align:center;
}

.time {
  width:110px;
}

.wait-card {
  border-radius:8px;
  padding:6px;
}

button {
  padding:5px;
  font-size:11px;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>
<div id="app"></div>

<script>
let data = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let waitList = JSON.parse(localStorage.getItem('waitList') || '[]');
let state = JSON.parse(localStorage.getItem('state') || '{}');

function save(){
  localStorage.setItem('state', JSON.stringify(state));
  localStorage.setItem('waitList', JSON.stringify(waitList));
}

// 👉 시간 기준 정렬
function sortWait(){
  waitList.sort((a,b)=>{
    if(!a.time) return 1;
    if(!b.time) return -1;
    return a.time.localeCompare(b.time);
  });
}

// 👉 색상 계산
function getColor(time){
  if(!time) return "#eee";

  const now = new Date();
  const [h,m] = time.split(":").map(Number);
  const t = new Date();
  t.setHours(h,m);

  const diff = (t - now) / 60000;

  if(diff < 30) return "#ffb3b3";
  if(diff < 60) return "#ffe0b3";
  return "#dbeafe";
}

// 👉 자동 자리 배치
function autoAssign(){
  Object.keys(state).forEach(k=>{
    if(!state[k] && waitList.length){
      const next = waitList.shift();
      if(next.name){
        state[k] = next.name;
      }
    }
  });
}

function render(){
  sortWait();
  autoAssign();

  const app = document.getElementById('app');
  app.innerHTML = '';

  Object.keys(data).forEach(section=>{
    const box = document.createElement('div');
    box.className = 'section';

    const title = document.createElement('h3');
    title.innerText = section;
    box.appendChild(title);

    data[section].forEach(label=>{
      const row = document.createElement('div');
      row.className = 'item';

      const labelDiv = document.createElement('div');
      labelDiv.className = 'label';
      labelDiv.innerText = label;

      const input = document.createElement('input');
      input.value = state[label] || '';

      input.addEventListener('keydown', e=>{
        if(e.key==='Enter'){
          state[label] = input.value;
          save();
        }
      });

      row.appendChild(labelDiv);
      row.appendChild(input);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 👉 대기
  const waitBox = document.createElement('div');
  waitBox.className = 'section';

  const title = document.createElement('h3');
  title.innerText = "대기";
  waitBox.appendChild(title);

  waitList.forEach((item,i)=>{
    const row = document.createElement('div');
    row.className = 'item wait-card';
    row.style.background = getColor(item.time);

    const input = document.createElement('input');
    input.value = item.name;

    const time = document.createElement('input');
    time.type = 'time';
    time.value = item.time;

    input.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        waitList[i].name = input.value;
        waitList[i].time = time.value;
        save();
        render();
      }
    });

    const del = document.createElement('button');
    del.innerText = '삭제';
    del.onclick = ()=>{
      waitList.splice(i,1);
      save();
      render();
    };

    row.appendChild(input);
    row.appendChild(time);
    row.appendChild(del);

    waitBox.appendChild(row);
  });

  const addBtn = document.createElement('button');
  addBtn.innerText = "대기 추가";
  addBtn.onclick = ()=>{
    waitList.push({name:"",time:""});
    save();
    render();
  };

  waitBox.appendChild(addBtn);
  app.appendChild(waitBox);

  save();
}

render();
</script>

</body>
</html>
