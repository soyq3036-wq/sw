<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
body {
  font-family: 'Pretendard', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: #fff;
  padding:20px;
}

h2 {
  text-align:center;
  margin-bottom:25px;
}

.section {
  background: rgba(255,255,255,0.05);
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
}

h3 {
  margin-bottom:10px;
  color:#9ad1ff;
}

.item {
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.label {
  width:110px;
  display:flex;
  align-items:center;
  justify-content:center;
}

input {
  flex:1;
  padding:8px;
  border-radius:10px;
  border:none;
  background:#1f1f2e;
  color:#fff;
  text-align:center;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  cursor:pointer;
}

.del {
  background:#ff4d6d;
}

.add-wait {
  margin-top:10px;
  width:100%;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>

<div id="app"></div>

<script>
let data = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

// 👉 대기는 동적 배열
let waitList = JSON.parse(localStorage.getItem('waitList') || '[""]');

let state = JSON.parse(localStorage.getItem('state') || '{}');

function save(){
  localStorage.setItem('state', JSON.stringify(state));
  localStorage.setItem('waitList', JSON.stringify(waitList));
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  // 일반 구역
  Object.keys(data).forEach(section => {
    const box = document.createElement('div');
    box.className = 'section';

    const title = document.createElement('h3');
    title.innerText = section;
    box.appendChild(title);

    data[section].forEach(label => {
      const row = document.createElement('div');
      row.className = 'item';

      const labelDiv = document.createElement('div');
      labelDiv.className = 'label';
      labelDiv.innerText = label;

      const input = document.createElement('input');
      input.value = state[label] || '';

      const saveBtn = document.createElement('button');
      saveBtn.innerText = '저장';
      saveBtn.onclick = () => {
        state[label] = input.value;
        save();
      };

      const delBtn = document.createElement('button');
      delBtn.innerText = '삭제';
      delBtn.className = 'del';
      delBtn.onclick = () => {
        state[label] = '';
        input.value = '';
        save();
      };

      row.appendChild(labelDiv);
      row.appendChild(input);
      row.appendChild(saveBtn);
      row.appendChild(delBtn);

      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 👉 대기 섹션
  const waitBox = document.createElement('div');
  waitBox.className = 'section';

  const waitTitle = document.createElement('h3');
  waitTitle.innerText = "대기";
  waitBox.appendChild(waitTitle);

  waitList.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'item';

    const labelDiv = document.createElement('div');
    labelDiv.className = 'label';
    labelDiv.innerText = "대기";

    const input = document.createElement('input');
    input.value = name;

    const saveBtn = document.createElement('button');
    saveBtn.innerText = '저장';
    saveBtn.onclick = () => {
      waitList[i] = input.value;
      save();
    };

    const delBtn = document.createElement('button');
    delBtn.innerText = '삭제';
    delBtn.className = 'del';
    delBtn.onclick = () => {
      waitList.splice(i,1);
      if(waitList.length === 0) waitList.push("");
      save();
      render();
    };

    row.appendChild(labelDiv);
    row.appendChild(input);
    row.appendChild(saveBtn);
    row.appendChild(delBtn);

    waitBox.appendChild(row);
  });

  // 👉 대기 추가 버튼
  const addBtn = document.createElement('button');
  addBtn.innerText = "대기 추가";
  addBtn.className = "add-wait";
  addBtn.onclick = () => {
    waitList.push("");
    save();
    render();
  };

  waitBox.appendChild(addBtn);
  app.appendChild(waitBox);
}

render();
</script>

</body>
</html>
