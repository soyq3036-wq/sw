<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body { font-family:'Pretendard'; background:#f5f7fa; padding:20px; }
h2 { text-align:center; }

.section {
  max-width:600px;
  margin:20px auto;
  background:white;
  padding:15px;
  border-radius:12px;
}

.item {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:8px;
}

input { width:140px; text-align:center; }

button { padding:5px 10px; cursor:pointer; }
.del { background:#ddd; }
.save { background:#22c55e; color:white; }
.auto { background:#3b82f6; color:white; }
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>
<div id="app"></div>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOe6vH_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 닉네임
let myName = localStorage.getItem("nickname");
if(!myName){
  myName = prompt("닉네임 입력") || "익명";
  localStorage.setItem("nickname", myName);
}

// 데이터 구조
let layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

// 🔥 실시간 로드
db.ref("tracker").on("value", snap=>{
  let val = snap.val();

  if(!val){
    val = {state:{}, waitList:[{name:"",time:""}]};
    db.ref("tracker").set(val);
  }

  state = val.state || {};
  waitList = val.waitList || [];
  render();
});

// 저장
function save(){
  db.ref("tracker").update({
    state,
    waitList
  });
}

// 자동 배치
function autoAssign(){
  let empty = [];

  Object.values(layout).forEach(arr=>{
    arr.forEach(pos=>{
      if(!state[pos]) empty.push(pos);
    });
  });

  empty.forEach(pos=>{
    if(waitList.length){
      let w = waitList.shift();
      if(w.name){
        state[pos] = {name:w.name, user:myName};
      }
    }
  });

  save();
}

// 렌더
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.entries(layout).forEach(([section, list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText = section;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const user = document.createElement("span");
      user.innerText = state[pos]?.user ? `(${state[pos].user})` : "";

      input.onkeydown = (e)=>{
        if(e.key==="Enter"){
          if(!input.value.trim()) return;
          state[pos] = {name:input.value, user:myName};
          save();
        }
      };

      const del = document.createElement("button");
      del.innerText="삭제";
      del.className="del";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      row.append(input, user, del);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 대기
  const waitBox = document.createElement("div");
  waitBox.className="section";

  const t = document.createElement("h3");
  t.innerText="대기";
  waitBox.appendChild(t);

  waitList.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className="item";

    const name = document.createElement("input");
    name.value = w.name;

    const time = document.createElement("input");
    time.type="time";
    time.value = w.time;

    const saveBtn = document.createElement("button");
    saveBtn.innerText="저장";
    saveBtn.className="save";
    saveBtn.onclick=()=>{
      if(!name.value.trim()) return;
      waitList[i] = {
        name:name.value,
        time:time.value,
        user:myName
      };
      save();
    };

    const del = document.createElement("button");
    del.innerText="삭제";
    del.className="del";
    del.onclick=()=>{
      waitList.splice(i,1);
      if(!waitList.length) waitList.push({name:"",time:""});
      save();
    };

    row.append(name,time,saveBtn,del);
    waitBox.appendChild(row);
  });

  const add = document.createElement("button");
  add.innerText="대기 추가";
  add.onclick=()=>{
    waitList.push({name:"",time:""});
    save();
  };

  const auto = document.createElement("button");
  auto.innerText="자동 배치";
  auto.className="auto";
  auto.onclick=autoAssign;

  waitBox.append(add,auto);
  app.appendChild(waitBox);
}
</script>

</body>
</html>
