<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리 PRO</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  font-family:'Pretendard';
  background:#000;
  color:white;
  padding:20px;
}

h2 { text-align:center; }

.section {
  max-width:760px;
  margin:20px auto;
  background:#0b0b0b;
  border-radius:16px;
  padding:20px;
  border:1px solid #111;
}

.item {
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.label { width:120px; text-align:right; color:#cbd5e1; }

input {
  background:#0b0f19;
  border:1px solid #1f2937;
  color:white;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

button {
  border:none;
  border-radius:8px;
  padding:5px 10px;
  cursor:pointer;
}

.save { background:#16a34a; color:white; }
.del { background:#374151; color:white; }

.locked {
  opacity:0.4;
  pointer-events:none;
}

.chat-box {
  max-height:200px;
  overflow:auto;
  background:#050505;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #111;
}

.chat-input {
  display:flex;
  gap:10px;
}

.stat {
  text-align:center;
  margin-bottom:10px;
  color:#94a3b8;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:10px;
  border:1px solid #333;
}
</style>
</head>

<body>

<h2>패도혈 PRO</h2>

<div id="stat" class="stat"></div>

<div class="section">
  <h3>채팅</h3>
  <div id="chat" class="chat-box"></div>
  <div class="chat-input">
    <input id="msg" placeholder="메시지">
    <button class="save" onclick="sendChat()">전송</button>
  </div>
</div>

<div id="app"></div>

<div id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", uid);

let myName = localStorage.getItem("nickname") || prompt("닉네임") || "익명";
localStorage.setItem("nickname", myName);

// 🔥 접속자 + 알림
const presenceRef = db.ref("presence/" + uid);
presenceRef.set({ name: myName });
presenceRef.onDisconnect().remove();

db.ref("presence").on("value", snap=>{
  const users = Object.values(snap.val()||{}).map(v=>v.name);
  document.getElementById("stat").innerText =
    `🟢 접속 ${users.length}명`;

  showToast(`👤 ${users[users.length-1]} 접속`);
});

// 🔥 자리 + 락
let state = {};
let locks = {};

db.ref("tracker/state").on("value", s=>{
  state = s.val() || {};
  render();
});

db.ref("locks").on("value", s=>{
  locks = s.val() || {};
  render();
});

// 🔥 채팅
db.ref("chat").limitToLast(30).on("value", snap=>{
  const box = document.getElementById("chat");
  box.innerHTML = "";
  const val = snap.val() || {};
  Object.values(val).forEach(v=>{
    const div = document.createElement("div");
    div.innerText = `${v.name}: ${v.msg}`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
});

function sendChat(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;
  db.ref("chat").push({ name:myName, msg });
  document.getElementById("msg").value = "";
}

// 🔥 락 시스템
function lock(pos){
  db.ref("locks/" + pos).set({ user:myName, time:Date.now() });
}

function unlock(pos){
  db.ref("locks/" + pos).remove();
}

// 🔥 render
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  let used = 0, total = 0;

  Object.keys(state).forEach(k=>{
    total++;
    if(state[k]?.name) used++;
  });

  document.getElementById("stat").innerText +=
    ` | 점유율 ${(used/total*100||0).toFixed(1)}%`;

  const box = document.createElement("div");
  box.className="section";

  Object.keys(state).forEach(pos=>{
    const row = document.createElement("div");
    row.className="item";

    const lockedBy = locks[pos]?.user;

    const input = document.createElement("input");
    input.value = state[pos]?.name || "";

    if(lockedBy && lockedBy !== myName){
      input.classList.add("locked");
      input.disabled = true;
    }

    input.onfocus = ()=>{
      lock(pos);
    };

    input.onblur = ()=>{
      unlock(pos);
    };

    const btn = document.createElement("button");
    btn.className="save";
    btn.innerText="저장";
    btn.onclick = ()=>{
      state[pos] = { name:input.value };
      db.ref("tracker/state").set(state);
      unlock(pos);
    };

    const del = document.createElement("button");
    del.className="del";
    del.innerText="삭제";
    del.onclick = ()=>{
      delete state[pos];
      db.ref("tracker/state").set(state);
    };

    row.append(pos, input, btn, del);

    if(lockedBy && lockedBy !== myName){
      const tag = document.createElement("div");
      tag.innerText = `🔒 ${lockedBy} 수정중`;
      tag.style.color="#f59e0b";
      row.appendChild(tag);
    }

    box.appendChild(row);
  });

  app.appendChild(box);
}

// 🔥 toast
function showToast(text){
  const t = document.getElementById("toast");
  t.innerText = text;
  t.className = "toast";
  setTimeout(()=> t.innerText="", 2000);
}
</script>

</body>
</html>
