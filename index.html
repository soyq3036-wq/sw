<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOe6vH_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 닉네임 (처음 1번만 입력)
let myName = localStorage.getItem("nickname");
if(!myName){
  myName = prompt("닉네임 입력");
  localStorage.setItem("nickname", myName);
}

let data = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

// 실시간
db.ref("tracker").on("value", snap=>{
  const val = snap.val() || {state:{}, waitList:[]};
  state = val.state;
  waitList = val.waitList;
  render();
});

// 저장
function save(){
  db.ref("tracker").update({
    state: state,
    waitList: waitList
  });
}

// 다음칸 이동
function moveNext(arr, current){
  const i = arr.indexOf(current);
  if(arr[i+1]) arr[i+1].focus();
}

// 자동 배치
function autoAssign(){
  let empty = [];
  Object.keys(data).forEach(s=>{
    data[s].forEach(l=>{
      if(!state[l]) empty.push(l);
    });
  });

  empty.forEach(l=>{
    if(waitList.length){
      let n = waitList.shift();
      if(n.name){
        state[l] = {name:n.name, user:myName};
      }
    }
  });

  save();
}

// 렌더
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  let inputs = [];

  Object.keys(data).forEach(section=>{
    const box = document.createElement('div');
    box.className = 'section';

    const title = document.createElement('h3');
    title.innerText = section;
    box.appendChild(title);

    data[section].forEach(label=>{
      const row = document.createElement('div');
      row.className = 'item';

      const labelDiv = document.createElement('div');
      labelDiv.className = 'label';
      labelDiv.innerText = label;

      const input = document.createElement('input');
      const value = state[label]?.name || '';
      const user = state[label]?.user || '';

      input.value = value;
      inputs.push(input);

      // 엔터 저장
      input.addEventListener('keydown', e=>{
        if(e.key==='Enter'){
          if(input.value.trim()==="") return;
          state[label] = {
            name: input.value,
            user: myName
          };
          save();
          moveNext(inputs, input);
        }
      });

      // 작성자 표시
      const userTag = document.createElement('div');
      userTag.style.fontSize = '11px';
      userTag.style.color = '#888';
      userTag.innerText = user ? `(${user})` : '';

      // 삭제 버튼
      const delBtn = document.createElement('button');
      delBtn.innerText='삭제';
      delBtn.className='del';
      delBtn.onclick=()=>{
        state[label] = '';
        save();
      };

      row.appendChild(labelDiv);
      row.appendChild(input);
      row.appendChild(userTag);
      row.appendChild(delBtn);

      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 대기
  const waitBox = document.createElement('div');
  waitBox.className = 'section';

  const t = document.createElement('h3');
  t.innerText = "대기";
  waitBox.appendChild(t);

  waitList.forEach((item,i)=>{
    const row = document.createElement('div');
    row.className = 'item';

    const input = document.createElement('input');
    input.value = item.name;

    const time = document.createElement('input');
    time.type='time';
    time.value=item.time;

    const userTag = document.createElement('div');
    userTag.style.fontSize='11px';
    userTag.style.color='#888';
    userTag.innerText = item.user ? `(${item.user})` : '';

    const saveBtn = document.createElement('button');
    saveBtn.innerText='저장';
    saveBtn.className='save-btn';
    saveBtn.onclick=()=>{
      if(input.value.trim()==="") return;
      waitList[i] = {
        name: input.value,
        time: time.value,
        user: myName
      };
      save();
    };

    const del = document.createElement('button');
    del.innerText='삭제';
    del.className='del';
    del.onclick=()=>{
      waitList.splice(i,1);
      if(!waitList.length) waitList.push({name:"",time:""});
      save();
    };

    row.appendChild(input);
    row.appendChild(time);
    row.appendChild(userTag);
    row.appendChild(saveBtn);
    row.appendChild(del);

    waitBox.appendChild(row);
  });

  const add = document.createElement('button');
  add.innerText="대기 추가";
  add.onclick=()=>{
    waitList.push({name:"",time:"",user:""});
    save();
  };

  const auto = document.createElement('button');
  auto.innerText="자동 배치";
  auto.className='auto-btn';
  auto.onclick=autoAssign;

  waitBox.appendChild(add);
  waitBox.appendChild(auto);
  app.appendChild(waitBox);
}
</script>
