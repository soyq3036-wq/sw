<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  font-family:'Pretendard';
  background:#f1f5f9;
  padding:30px;
}

h2 {
  text-align:center;
  margin-bottom:30px;
  font-weight:600;
}

.section {
  max-width:700px;
  margin:0 auto 20px;
  background:white;
  border-radius:18px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h3 {
  text-align:center;
  margin-bottom:20px;
}

.item {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.label {
  width:120px;
  text-align:right;
  font-size:14px;
  color:#555;
}

.input-wrap {
  display:flex;
  align-items:center;
  gap:8px;
}

input {
  width:140px;
  padding:7px;
  border-radius:10px;
  border:1px solid #ddd;
  text-align:center;
}

.time { width:120px; }

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.save { background:#22c55e; color:white; }
.del { background:#e5e7eb; }
.del:hover { background:#ef4444; color:white; }

.user {
  font-size:11px;
  color:#888;
  width:60px;
  text-align:center;
}

/* 🔥 대기 색상 */
.wait-normal { background:#e0f2fe; }
.wait-soon { background:#fde68a; }
.wait-urgent { background:#fecaca; }

.wait-row {
  padding:6px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOe6vH_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = localStorage.getItem("nickname");
if(!myName){
  myName = prompt("닉네임 입력") || "익명";
  localStorage.setItem("nickname", myName);
}

let layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

// 시간 색상
function getTimeClass(time){
  if(!time) return "wait-normal";

  const now = new Date();
  const [h,m] = time.split(":").map(Number);
  const t = new Date();
  t.setHours(h,m);

  const diff = (t - now)/60000;

  if(diff < 30) return "wait-urgent";
  if(diff < 60) return "wait-soon";
  return "wait-normal";
}

// 실시간
db.ref("tracker").on("value", snap=>{
  let val = snap.val();
  if(!val){
    val = {state:{}, waitList:[{name:"",time:""}]};
    db.ref("tracker").set(val);
  }
  state = val.state || {};
  waitList = val.waitList || [];
  render();
});

// 저장
function save(){
  db.ref("tracker").update({state, waitList});
}

// 렌더
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.entries(layout).forEach(([section, list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText = section;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const label = document.createElement("div");
      label.className="label";
      label.innerText = pos;

      const wrap = document.createElement("div");
      wrap.className="input-wrap";

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const user = document.createElement("div");
      user.className="user";
      user.innerText = state[pos]?.user ? `(${state[pos].user})` : "";

      // 엔터 저장
      input.onkeydown = (e)=>{
        if(e.key==="Enter"){
          if(!input.value.trim()) return;
          state[pos] = {name:input.value, user:myName};
          save();
        }
      };

      // 버튼 저장
      const saveBtn = document.createElement("button");
      saveBtn.innerText="저장";
      saveBtn.className="save";
      saveBtn.onclick=()=>{
        if(!input.value.trim()) return;
        state[pos] = {name:input.value, user:myName};
        save();
      };

      const del = document.createElement("button");
      del.innerText="삭제";
      del.className="del";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      wrap.append(input, saveBtn, del);

      row.append(label, wrap, user);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 대기
  const waitBox = document.createElement("div");
  waitBox.className="section";

  const t = document.createElement("h3");
  t.innerText="대기";
  waitBox.appendChild(t);

  waitList.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className="item wait-row " + getTimeClass(w.time);

    const name = document.createElement("input");
    name.value = w.name;

    const time = document.createElement("input");
    time.type="time";
    time.value = w.time;
    time.className="time";

    const saveBtn = document.createElement("button");
    saveBtn.innerText="저장";
    saveBtn.className="save";
    saveBtn.onclick=()=>{
      if(!name.value.trim()) return;
      waitList[i] = {name:name.value, time:time.value, user:myName};
      save();
    };

    const del = document.createElement("button");
    del.innerText="삭제";
    del.className="del";
    del.onclick=()=>{
      waitList.splice(i,1);
      if(!waitList.length) waitList.push({name:"",time:""});
      save();
    };

    row.append(name, time, saveBtn, del);
    waitBox.appendChild(row);
  });

  const add = document.createElement("button");
  add.innerText="대기 추가";
  add.className="save";
  add.onclick=()=>{
    waitList.push({name:"",time:""});
    save();
  };

  waitBox.appendChild(add);
  app.appendChild(waitBox);
}
</script>

</body>
</html>
