<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
body {
  font-family: 'Pretendard', sans-serif;
  background: linear-gradient(135deg, #eef2f7, #f8fafc);
  padding:30px;
}

h2 {
  text-align:center;
  margin-bottom:30px;
  font-size:24px;
  font-weight:600;
}

.section {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

h3 {
  margin-bottom:12px;
  font-size:14px;
  color:#555;
}

.item {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
}

.label {
  width:95px;
  font-size:13px;
  text-align:right;
  color:#666;
}

input {
  width:110px;
  padding:7px;
  border-radius:10px;
  border:1px solid #ddd;
  text-align:center;
}

button {
  padding:6px 9px;
  font-size:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  cursor:pointer;
}

.del {
  background:#e5e7eb;
  color:#333;
}

.add-wait {
  width:100%;
  margin-top:12px;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>

<div id="app"></div>

<script>
let data = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let waitList = JSON.parse(localStorage.getItem('waitList') || '[""]');
let state = JSON.parse(localStorage.getItem('state') || '{}');

function save(){
  localStorage.setItem('state', JSON.stringify(state));
  localStorage.setItem('waitList', JSON.stringify(waitList));
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  let allInputs = [];

  Object.keys(data).forEach(section => {
    const box = document.createElement('div');
    box.className = 'section';

    const title = document.createElement('h3');
    title.innerText = section;
    box.appendChild(title);

    data[section].forEach(label => {
      const row = document.createElement('div');
      row.className = 'item';

      const labelDiv = document.createElement('div');
      labelDiv.className = 'label';
      labelDiv.innerText = label;

      const input = document.createElement('input');
      input.value = state[label] || '';

      allInputs.push(input);

      const saveBtn = document.createElement('button');
      saveBtn.innerText = '저장';
      saveBtn.onclick = () => {
        state[label] = input.value;
        save();
      };

      const delBtn = document.createElement('button');
      delBtn.innerText = '삭제';
      delBtn.className = 'del';
      delBtn.onclick = () => {
        state[label] = '';
        input.value = '';
        save();
      };

      row.appendChild(labelDiv);
      row.appendChild(input);
      row.appendChild(saveBtn);
      row.appendChild(delBtn);

      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 대기
  const waitBox = document.createElement('div');
  waitBox.className = 'section';

  const waitTitle = document.createElement('h3');
  waitTitle.innerText = "대기";
  waitBox.appendChild(waitTitle);

  waitList.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'item';

    const labelDiv = document.createElement('div');
    labelDiv.className = 'label';
    labelDiv.innerText = "대기";

    const input = document.createElement('input');
    input.value = name;

    allInputs.push(input);

    const saveBtn = document.createElement('button');
    saveBtn.innerText = '저장';
    saveBtn.onclick = () => {
      waitList[i] = input.value;
      save();
    };

    const delBtn = document.createElement('button');
    delBtn.innerText = '삭제';
    delBtn.className = 'del';
    delBtn.onclick = () => {
      waitList.splice(i,1);
      if(waitList.length === 0) waitList.push("");
      save();
      render();
    };

    row.appendChild(labelDiv);
    row.appendChild(input);
    row.appendChild(saveBtn);
    row.appendChild(delBtn);

    waitBox.appendChild(row);
  });

  const addBtn = document.createElement('button');
  addBtn.innerText = "대기 추가";
  addBtn.className = "add-wait";
  addBtn.onclick = () => {
    waitList.push("");
    save();
    render();
  };

  waitBox.appendChild(addBtn);
  app.appendChild(waitBox);

  // 👉 엔터 기능 + 다음칸 이동
  allInputs.forEach((input, index) => {
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter'){
        input.blur();

        // 저장 처리
        const label = input.parentElement.querySelector('.label').innerText;

        if(label === "대기"){
          const i = Array.from(input.parentElement.parentElement.children).indexOf(input.parentElement) - 1;
          waitList[i] = input.value;
        } else {
          state[label] = input.value;
        }

        save();

        // 다음칸 이동
        if(allInputs[index + 1]){
          allInputs[index + 1].focus();
        } else {
          input.focus();
        }
      }
    });
  });
}

render();
</script>

</body>
</html>
