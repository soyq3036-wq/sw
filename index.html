<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  font-family:'Pretendard';
  background:#f1f5f9;
  padding:30px;
}

h2 {
  text-align:center;
  margin-bottom:30px;
  font-weight:600;
}

.section {
  max-width:650px;
  margin:0 auto 20px;
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

h3 {
  text-align:center;
  margin-bottom:15px;
  font-weight:600;
}

.item {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.label {
  width:120px;
  text-align:right;
  font-size:14px;
  color:#555;
}

input {
  width:150px;
  padding:7px;
  border-radius:10px;
  border:1px solid #ddd;
  text-align:center;
  transition:0.2s;
}

input:focus {
  outline:none;
  border-color:#3b82f6;
  box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  transition:0.2s;
}

.del {
  background:#e5e7eb;
}

.del:hover {
  background:#ef4444;
  color:white;
}

.save {
  background:#22c55e;
  color:white;
}

.save:hover {
  background:#16a34a;
}

.time {
  width:120px;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOe6vH_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 닉네임
let myName = localStorage.getItem("nickname");
if(!myName){
  myName = prompt("닉네임 입력") || "익명";
  localStorage.setItem("nickname", myName);
}

// 구조
let layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

// 실시간
db.ref("tracker").on("value", snap=>{
  let val = snap.val();

  if(!val){
    val = {state:{}, waitList:[{name:"",time:""}]};
    db.ref("tracker").set(val);
  }

  state = val.state || {};
  waitList = val.waitList || [];
  render();
});

// 저장
function save(){
  db.ref("tracker").update({state, waitList});
}

// 렌더
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.entries(layout).forEach(([section, list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText = section;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const label = document.createElement("div");
      label.className="label";
      label.innerText = pos;

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const user = document.createElement("span");
      user.style.fontSize="11px";
      user.style.color="#888";
      user.innerText = state[pos]?.user ? `(${state[pos].user})` : "";

      input.onkeydown = (e)=>{
        if(e.key==="Enter"){
          if(!input.value.trim()) return;
          state[pos] = {name:input.value, user:myName};
          save();
        }
      };

      const del = document.createElement("button");
      del.innerText="삭제";
      del.className="del";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      row.append(label, input, user, del);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  // 대기
  const waitBox = document.createElement("div");
  waitBox.className="section";

  const t = document.createElement("h3");
  t.innerText="대기";
  waitBox.appendChild(t);

  waitList.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className="item";

    const name = document.createElement("input");
    name.value = w.name;

    const time = document.createElement("input");
    time.type="time";
    time.value = w.time;
    time.className="time";

    const saveBtn = document.createElement("button");
    saveBtn.innerText="저장";
    saveBtn.className="save";
    saveBtn.onclick=()=>{
      if(!name.value.trim()) return;
      waitList[i] = {
        name:name.value,
        time:time.value,
        user:myName
      };
      save();
    };

    const del = document.createElement("button");
    del.innerText="삭제";
    del.className="del";
    del.onclick=()=>{
      waitList.splice(i,1);
      if(!waitList.length) waitList.push({name:"",time:""});
      save();
    };

    row.append(name, time, saveBtn, del);
    waitBox.appendChild(row);
  });

  const add = document.createElement("button");
  add.innerText="대기 추가";
  add.className="save";
  add.onclick=()=>{
    waitList.push({name:"",time:""});
    save();
  };

  waitBox.appendChild(add);
  app.appendChild(waitBox);
}
</script>

</body>
</html>
